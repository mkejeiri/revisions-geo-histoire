<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🇧🇪 Révisions — Géo & Histoire</title>
    <style>
        body { font-family: 'Comic Sans MS', cursive, sans-serif; max-width: 700px; margin: 0 auto; padding: 40px 20px; background: #fef9e7; text-align: center; }
        h1 { color: #2c3e50; font-size: 2.2em; }
        p { font-size: 1.2em; color: #555; }
        .cards { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }

        .geo { border-top: 5px solid #2980b9; }

<body>
    <h1>🇧🇪 Révisions pour l'examen</h1>
    <p>Choisis ta matière ! 20 questions avec photos pour chaque.</p>

    <div class="cards">
        <a href="geographie.html" class="card geo">
            <div class="emoji">🌍</div>
            <h2>Géographie</h2>
            <p>24 questions<br/>Ensembles morphologiques, fleuves, villes, paysage urbain</p>
        </a>
        <a href="histoire.html" class="card hist">
            <div class="emoji">📜</div>
